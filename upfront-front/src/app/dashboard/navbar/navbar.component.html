<nav class="navbar">
  <!-- Hamburger (mobile) -->
  <button class="hamburger icon-btn" (click)="onToggleSidebar()" aria-label="Menu">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- Logo -->
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#4460ed,#6787f3);display:flex;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M9 2L16 6V12L9 16L2 12V6L9 2Z" fill="white" opacity="0.9"/>
        <path d="M9 6L12 9L9 12L6 9L9 6Z" fill="white"/>
      </svg>
    </div>
    <span class="logo-text">UpFront</span>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;color:#94a3b8">
      <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.6"/>
      <path d="M11 11L14 14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
    <input type="text" placeholder="Search posts, companies, reviews…" id="searchInput">
    <span style="font-size:12px;color:#cbd0e0;flex-shrink:0;background:#e8ecf5;padding:2px 7px;border-radius:5px;font-family:'DM Mono',monospace;">⌘K</span>
  </div>

  <!-- Right actions -->
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px;">
    <!-- WS Status -->
    <div class="ws-indicator" [ngStyle]="{'background': wsStatus() === 'CONNECTED' ? 'rgba(16,185,129,0.08)' : 'rgba(239,68,68,0.08)', 'color': wsStatus() === 'CONNECTED' ? '#10b981' : '#ef4444'}" data-tooltip="WebSocket connected">
      <div class="ws-dot" [ngStyle]="{'background': wsStatus() === 'CONNECTED' ? '#10b981' : '#ef4444'}"></div>
      <span>{{ wsStatus() === 'CONNECTED' ? 'Live' : 'Offline' }}</span>
    </div>

    <!-- Theme toggle -->
    <button class="theme-toggle" (click)="toggleTheme()" aria-label="Toggle theme">{{ isDark ? '☀️' : '🌙' }}</button>

    <!-- Notifications -->
    <div style="position:relative;">
      <button class="icon-btn" (click)="toggleNotifications()" aria-label="Notifications">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 2C9 2 5 4 5 9V13H3V14H15V13H13V9C13 4 9 2 9 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M7.5 14.5C7.5 15.3 8.2 16 9 16C9.8 16 10.5 15.3 10.5 14.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="notif-badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
      </button>

      <!-- Notification Panel -->
      <div class="notif-panel" *ngIf="notifOpen">
        <div style="padding:16px 16px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,0.06);">
          <span style="font-weight:700;font-size:15px;">Notifications</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:12px;color:#64748b;cursor:pointer;" (click)="markAllRead()">Mark all read</span>
            <span style="width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block;" title="Live"></span>
          </div>
        </div>
        <div>
          <div *ngFor="let n of notifications" class="notif-item" [class.unread]="n.unread" (click)="readNotif(n)">
            <div [style.background]="n.iconBg + '20'" style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">{{n.icon}}</div>
            <div style="flex:1;min-width:0;">
              <div [style.fontWeight]="n.unread ? '600' : '500'" style="font-size:13px;margin-bottom:2px;">{{n.title}}</div>
              <div style="font-size:12px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{n.body}}</div>
              <div style="font-size:11px;color:#cbd0e0;margin-top:4px;">{{n.time}}</div>
            </div>
            <div *ngIf="n.unread" style="width:8px;height:8px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:4px;"></div>
          </div>
        </div>
        <div style="padding:12px 16px;text-align:center;border-top:1px solid rgba(0,0,0,0.06);">
          <span style="font-size:13px;color:var(--brand);cursor:pointer;font-weight:600;">View all notifications →</span>
        </div>
      </div>
    </div>

    <!-- Profile -->
    <button class="profile-btn">
      <span style="font-size:13px;font-weight:600;color:#64748b;">Hey, {{firstName}}</span>
      <div class="avatar" style="background:linear-gradient(135deg,#4460ed,#a78bfa);width:32px;height:32px;font-size:12px;">{{initials}}</div>
    </button>
  </div>
</nav>
