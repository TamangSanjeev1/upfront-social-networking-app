<div class="table-shell">
    <!-- Header -->
    <div class="shell-header">
        <div class="header-left">
            <h1 class="shell-title">All Notifications</h1>
            <span class="record-count">{{ dataSource.filteredData.length }} records</span>
        </div>
    </div>

    <!-- Loading bar -->
    <mat-progress-bar *ngIf="loading" mode="indeterminate" class="loader-bar"></mat-progress-bar>

    <!-- Table -->
    <div class="table-container">
        <table mat-table [dataSource]="dataSource" class="data-table">

            <ng-container matColumnDef="read">
                <th mat-header-cell *matHeaderCellDef>Read</th>
                <td mat-cell *matCellDef="let row">
                    <span class="status-dot"></span>
                    <div *ngIf="row.unread" style="width:8px;height:8px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:4px;"></div>
            </ng-container>

            <ng-container matColumnDef="icon">
                <th mat-header-cell *matHeaderCellDef>Icon</th>
                <td mat-cell *matCellDef="let row">
                <span class="status-dot"></span>
                  {{ row.type == 'post' ? "💬" : "#" }}
            </ng-container>

            <ng-container matColumnDef="title">
                <th mat-header-cell *matHeaderCellDef>Title</th>
                <td mat-cell *matCellDef="let row">
                    <span class="dept-badge" class="post-body">{{ row.title }}</span>
                </td>
            </ng-container>

            <ng-container matColumnDef="body">
                <th mat-header-cell *matHeaderCellDef>Body</th>
                <td mat-cell *matCellDef="let row">
                    <span class="dept-badge" class="post-body">{{ row.body }}</span>
                </td>
            </ng-container>


            <ng-container matColumnDef="type">
                <th mat-header-cell *matHeaderCellDef>Type</th>
                <td mat-cell *matCellDef="let row">
                    <span class="dept-badge">{{ row.type }}</span>
                </td>
            </ng-container>



            <ng-container matColumnDef="createdDate">
                <th mat-header-cell *matHeaderCellDef>Created Date</th>
                <td mat-cell *matCellDef="let row" class="muted">{{ Utils.timeAgo(row.timestamp) }}</td>
            </ng-container>

            <!-- Actions Column -->
<!--            <ng-container matColumnDef="actions">-->
<!--                <th mat-header-cell *matHeaderCellDef class="align-right">Actions</th>-->
<!--                <td mat-cell *matCellDef="let row" class="align-right">-->
<!--                    <button mat-icon-button matTooltip="Edit" class="action-btn">-->
<!--                        <mat-icon>edit_outlined</mat-icon>-->
<!--                    </button>-->
<!--                    <button mat-icon-button matTooltip="Delete" class="action-btn delete-btn">-->
<!--                        <mat-icon>delete_outline</mat-icon>-->
<!--                    </button>-->
<!--                </td>-->
<!--            </ng-container>-->

            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="data-row clickable-row" (click)="onRowClick(row)"></tr>

            <!-- No data row -->
            <tr class="mat-row no-data-row" *matNoDataRow>
                <td class="mat-cell no-data-cell" [attr.colspan]="displayedColumns.length">
                </td>
            </tr>
        </table>
    </div>

    <!-- Paginator -->
    <mat-paginator
        #paginator
        [pageSize]="10"
        showFirstLastButtons
        aria-label="Select page"
        class="table-paginator"
        [length]="totalElements"
    ></mat-paginator>
</div>
