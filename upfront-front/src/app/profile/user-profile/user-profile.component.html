<div class="app-root" [class.dark]="ps.isDarkMode()">
    <!-- Top Nav Bar -->
    <app-navbar (toggleSidebar)="toggleSidebar()" class="nav-inner"></app-navbar>

    <!-- Page Body -->
    <main class="page-body">
        <!-- Skeleton Loader -->
        @if (ps.isLoading()) {
            <div class="skeleton-page">
                <div class="skeleton-header">
                    <div class="skeleton-cover skeleton-shimmer"></div>
                    <div class="skeleton-row">
                        <div class="skeleton-avatar skeleton-shimmer"></div>
                        <div class="skeleton-actions">
                            <div class="skeleton-btn skeleton-shimmer"></div>
                            <div class="skeleton-btn skeleton-shimmer"></div>
                        </div>
                    </div>
                    <div class="skeleton-name skeleton-shimmer"></div>
                    <div class="skeleton-title skeleton-shimmer"></div>
                    <div class="skeleton-meta skeleton-shimmer"></div>
                </div>

                <div class="skeleton-body">
                    <div class="skeleton-sidebar">
                        <div class="skeleton-card skeleton-shimmer"></div>
                        <div class="skeleton-card skeleton-shimmer"></div>
                    </div>
                    <div class="skeleton-main">
                        <div class="skeleton-card skeleton-shimmer" style="height: 200px;"></div>
                    </div>
                </div>
            </div>
        }

        <!-- Real Content -->
        @if (!ps.isLoading()) {
            <div class="profile-page">
                <!-- Profile Header (full width) -->
                <div class="section-full">
                    <app-profile-header [viewUserInfo]="viewUser()" />
                </div>

                <!-- Two-column layout -->
                <div class="profile-columns">
                    <!-- Left Sidebar -->
                    <aside class="profile-sidebar">
                        <app-profile-bio [viewUserInfo]="viewUser()" />
                        <app-profile-links [viewUserInfo]="viewUser()" />
                        <app-profile-stats [viewUserInfo]="viewUser()"/>
<!--                        <app-profile-skills />-->
                    </aside>

                    <!-- Main Feed -->
                    <section class="profile-main">
                        <app-profile-activity-tabs [viewUserInfo]="viewUser()" />
                    </section>
                </div>
            </div>
        }
    </main>
</div>
